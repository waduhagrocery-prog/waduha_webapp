<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Waduha Grocery">
  <defs>
    <!-- Green disc with subtle ring like the real logo -->
    <radialGradient id="discGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#7FCB36"/>
      <stop offset="100%" stop-color="#5BA822"/>
    </radialGradient>
    <!-- Path for the curved WADUHA text -->
    <path id="topArc" d="M 30,100 A 70,70 0 0 1 170,100" fill="none"/>
    <path id="bottomArc" d="M 30,108 A 70,70 0 0 0 170,108" fill="none"/>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="#3F7F0E"/>
  <!-- Inner disc -->
  <circle cx="100" cy="100" r="86" fill="url(#discGrad)"/>
  <!-- White ring under the cart -->
  <circle cx="100" cy="100" r="64" fill="#FFFFFF"/>

  <!-- WADUHA arched top -->
  <text font-family="-apple-system, 'Plus Jakarta Sans', 'Inter', sans-serif"
        font-weight="800" font-size="22" fill="#1F4F0A" letter-spacing="2">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">WADUHA</textPath>
  </text>

  <!-- Shopping cart -->
  <g transform="translate(100,108)" fill="none" stroke="#2D5F0E" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cart body trapezoid -->
    <path d="M -22,-6 L 22,-6 L 18,16 L -18,16 Z" fill="#FFFFFF"/>
    <!-- Top handle -->
    <path d="M -22,-6 L -28,-14 L -34,-14"/>
    <!-- Wheels -->
    <circle cx="-12" cy="22" r="3.4" fill="#2D5F0E"/>
    <circle cx="12" cy="22" r="3.4" fill="#2D5F0E"/>
    <!-- Cart fill: cute groceries (simplified blocks) -->
    <rect x="-16" y="-14" width="8" height="10" rx="1" fill="#FFD24A" stroke-width="2"/>
    <rect x="-6" y="-18" width="6" height="14" rx="1" fill="#7AB8E5" stroke-width="2"/>
    <path d="M 4,-15 L 12,-15 L 14,-4 L 2,-4 Z" fill="#F4A261" stroke-width="2"/>
    <path d="M 14,-20 L 16,-4" stroke-width="2.4"/>
  </g>

  <!-- GROCERY at bottom -->
  <text x="100" y="170" text-anchor="middle"
        font-family="-apple-system, 'Plus Jakarta Sans', 'Inter', sans-serif"
        font-weight="900" font-size="20" fill="#FFFFFF"
        stroke="#1F4F0A" stroke-width="1.4" paint-order="stroke"
        letter-spacing="2">GROCERY</text>
</svg>
